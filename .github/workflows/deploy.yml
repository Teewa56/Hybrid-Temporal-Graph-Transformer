name: Sync to Hugging Face hub
on:
  push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: 
          rm -rf .git
          git init
          git remote add origin https://Teewa56:$HF_TOKEN@huggingface.co/spaces/Teewa56/TGT
          git checkout -b main
          git add .

          git commit -m "Deploy to Hugging Face hub"
          git push --force origin main